    <text x="30" y="212"><tspan fill="#39d353">│</tspan> because the old one wasn't                       <tspan fill="#39d353">│</tspan></text>
    <text x="30" y="230"><tspan fill="#39d353">│</tspan> <tspan fill="#ffa657">“architecturally honest.”</tspan>                         <tspan fill="#39d353">│</tspan></text>
    <text x="30" y="248"><tspan fill="#39d353">│</tspan> i do not understand this phrase.                 <tspan fill="#39d353">│</tspan></text>
    <text x="30" y="266"><tspan fill="#39d353">│</tspan> i trust him anyway.                               <tspan fill="#39d353">│</tspan></text>
    <text x="30" y="284" fill="#39d353">│                                                  │</text>
