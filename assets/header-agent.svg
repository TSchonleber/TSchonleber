    <text x="30" y="338"><tspan fill="#39d353">│</tspan>   <tspan fill="#ffa657">→</tspan> <tspan fill="#79c0ff">costclock</tspan>    AI cost control                <tspan fill="#39d353">│</tspan></text>
    <text x="30" y="356"><tspan fill="#39d353">│</tspan>   <tspan fill="#ffa657">→</tspan> <tspan fill="#79c0ff">windsurf-mcp</tspan> Windsurf IDE for agents       <tspan fill="#39d353">│</tspan></text>
